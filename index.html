<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>סבא מצויר</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
    }
    canvas { display: block; touch-action: none; }

    /* Fullscreen prompt button — shown on mobile */
    #fs-btn {
      display: none;
      position: fixed;
      top: 8px; left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: 2px solid #fff;
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 14px;
      cursor: pointer;
    }
    @media (max-width: 900px) {
      #fs-btn { display: block; }
    }
  </style>
</head>
<body>
  <button id="fs-btn" onclick="goFullscreen()">⛶ מסך מלא</button>
  <div id="app"></div>

  <script>
    // Auto fullscreen on mobile touch
    function goFullscreen() {
      const el = document.documentElement;
      const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
      if (req) req.call(el);
      // Hide button after entering fullscreen
      document.getElementById('fs-btn').style.display = 'none';
    }

    // Try auto fullscreen on first touch
    document.addEventListener('touchstart', function autoFs() {
      goFullscreen();
      document.removeEventListener('touchstart', autoFs);
    }, { once: true });

    // Show button again if fullscreen exits
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        const btn = document.getElementById('fs-btn');
        if (btn) btn.style.display = 'block';
      }
    });
  </script>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
